<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股数据分析平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e; color: #e0e0e0;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* Nav */
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; background: #16213e; border-bottom: 1px solid #0f3460;
}
.nav h1 { font-size: 20px; color: #e94560; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.status { font-size: 12px; color: #888; }

/* Main center content */
.main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 60px 24px;
}

/* Slogan */
.slogan {
  margin-bottom: 24px;
  font-size: 15px;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #e94560, #f9a825);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  opacity: .85;
}

/* Search */
.search-box { position: relative; width: 100%; max-width: 520px; }
.search-input {
  width: 100%; padding: 14px 20px; padding-right: 50px;
  background: #16213e; border: 2px solid #0f3460; border-radius: 8px;
  color: #fff; font-size: 16px; outline: none; transition: border-color .2s;
}
.search-input:focus { border-color: #e94560; }
.search-input::placeholder { color: #555; }
.search-icon {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  color: #555; font-size: 18px; pointer-events: none;
}

/* Dropdown */
.dropdown {
  display: none; position: absolute; top: 100%; left: 0; right: 0;
  margin-top: 4px; background: #16213e; border: 1px solid #0f3460;
  border-radius: 8px; max-height: 320px; overflow-y: auto; z-index: 10;
}
.dropdown.show { display: block; }
.dropdown-item {
  padding: 10px 20px; cursor: pointer; font-size: 14px; display: flex;
  justify-content: space-between; align-items: center;
}
.dropdown-item:hover { background: #0f3460; }
.dropdown-item .code { color: #3498db; }
.dropdown-item .name { color: #888; font-size: 12px; }

/* Action buttons */
.actions {
  display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap;
  justify-content: center; width: 100%; max-width: 520px;
}
.btn {
  padding: 10px 24px; border-radius: 8px; border: 1px solid #2a2a4a;
  cursor: pointer; font-size: 14px; transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-update { background: #0f3460; color: #e0e0e0; }
.btn-update:hover { background: #162447; border-color: #e94560; }
.btn-update.running { background: #e94560; color: #fff; border-color: #e94560; }
.btn-tool { background: #0f3460; color: #e0e0e0; }
.btn-tool:hover { background: #162447; border-color: #e94560; }

/* Progress */
.progress-wrap {
  display: none; width: 100%; max-width: 520px;
  margin-top: 20px;
}
.progress-wrap.active { display: block; }
.progress-bar-bg {
  height: 8px; background: #0f3460; border-radius: 4px; overflow: hidden;
}
.progress-bar {
  height: 100%; width: 0; background: linear-gradient(90deg, #e94560, #ff6b6b);
  border-radius: 4px; transition: width .3s;
}
.progress-text { font-size: 12px; color: #888; margin-top: 6px; text-align: center; }
</style>
</head>
<body>

<div class="nav">
  <h1>A股数据分析平台</h1>
  <div class="nav-right">
    <span class="status" id="status"></span>
    <span id="authBtn"></span>
  </div>
</div>

<div class="main">
  <div class="slogan">价格包容一切，裸K才是王道</div>
  <div class="search-box">
    <input class="search-input" id="searchInput" type="text" placeholder="输入股票代码或名称搜索..." autocomplete="off">
    <span class="search-icon">&#128269;</span>
    <div class="dropdown" id="dropdown"></div>
  </div>

  <div class="actions">
    <button class="btn btn-update" id="updateBtn" onclick="triggerUpdate()">&#128260; 更新数据</button>
    <button class="btn btn-tool" onclick="goAuth('/watchlist')">&#9734; 自选股</button>
    <button class="btn btn-tool" id="recommendBtn" onclick="goAuth('/recommend')">&#127919; 股票推荐</button>
    <button class="btn btn-tool" id="strategyBtn" onclick="goAuth('/strategy')">&#128270; 策略选股</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>
</div>

<script>
const searchInput = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');
let searchTimer;

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (!q) { dropdown.classList.remove('show'); return; }
  searchTimer = setTimeout(() => search(q), 200);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = searchInput.value.trim();
    if (q) search(q);
  }
  if (e.key === 'Escape') {
    dropdown.classList.remove('show');
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) dropdown.classList.remove('show');
});

async function search(q) {
  const resp = await fetch(`/api/stocks?q=${q}&page=1&size=20`);
  const json = await resp.json();
  const data = json.data;
  if (!data.length) {
    dropdown.innerHTML = '<div class="dropdown-item" style="color:#555">无匹配结果</div>';
    dropdown.classList.add('show');
    return;
  }
  dropdown.innerHTML = data.map(s => {
    const cls = s.pct_change >= 0 ? 'color:#e74c3c' : 'color:#2ecc71';
    const sign = s.pct_change >= 0 ? '+' : '';
    const name = s.name || '';
    return `<div class="dropdown-item" onclick="goStock('${s.code}')">
      <span><span class="code">${s.code}</span>${name ? ` <span style="color:#e0e0e0">${name}</span>` : ''}</span>
      <span style="${cls}">${sign}${s.pct_change.toFixed(2)}%</span>
    </div>`;
  }).join('');
  dropdown.classList.add('show');
}

function goStock(code) {
  window.location.href = `/stock/${code}`;
}

// Update
async function triggerUpdate() {
  if (!_loggedIn) { window.location.href = '/login'; return; }
  if (!confirm('确认更新所有股票数据？更新期间可能会持续较长时间。')) return;
  const btn = document.getElementById('updateBtn');
  btn.classList.add('running');
  btn.innerHTML = '&#9889; 更新中...';
  await fetch('/api/update', {method:'POST'});
  pollStatus();
}

async function pollStatus() {
  const resp = await fetch('/api/update/status');
  const s = await resp.json();
  const el = document.getElementById('status');
  const btn = document.getElementById('updateBtn');
  const pw = document.getElementById('progressWrap');
  const pb = document.getElementById('progressBar');
  const pt = document.getElementById('progressText');
  if (s.running) {
    el.textContent = s.message || '正在更新数据...';
    btn.classList.add('running');
    btn.innerHTML = '&#9889; 更新中...';
    pw.classList.add('active');
    if (s.total > 0) {
      const pct = Math.round(s.current / s.total * 100);
      pb.style.width = pct + '%';
      pt.textContent = `${s.current} / ${s.total}（${pct}%）- 当前: ${s.code}`;
    }
    setTimeout(pollStatus, 1000);
  } else {
    el.textContent = s.message || '就绪';
    btn.classList.remove('running');
    btn.innerHTML = '&#128260; 更新数据';
    pw.classList.remove('active');
    pb.style.width = '0';
    pt.textContent = '';
  }
}

pollStatus();

// Auth state
let _loggedIn = false;

async function checkAuth() {
  try {
    const resp = await fetch('/api/check');
    const data = await resp.json();
    _loggedIn = data.logged_in;
  } catch(e) {
    _loggedIn = false;
  }
  const authBtn = document.getElementById('authBtn');
  if (_loggedIn) {
    authBtn.innerHTML = '<button class="btn btn-tool" onclick="doLogout()" style="padding:6px 14px;font-size:12px;">退出</button>';
  } else {
    authBtn.innerHTML = '<button class="btn btn-tool" onclick="window.location.href=\'/login\'" style="padding:6px 14px;font-size:12px;">登录</button>';
  }
}

function goAuth(path) {
  if (_loggedIn) {
    window.location.href = path;
  } else {
    window.location.href = '/login';
  }
}

async function doLogout() {
  await fetch('/api/logout', {method:'POST'});
  _loggedIn = false;
  checkAuth();
}

checkAuth();
</script>
</body>
</html>
