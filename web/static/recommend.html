<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票推荐排序 - A股数据分析平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e; color: #e0e0e0;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* Nav */
.nav {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 24px; background: #16213e; border-bottom: 1px solid #0f3460;
}
.back-btn {
  padding: 5px 12px; background: transparent; border: 1px solid #333;
  border-radius: 6px; color: #888; font-size: 13px; cursor: pointer; transition: all .2s;
}
.back-btn:hover { border-color: #e94560; color: #e94560; }
.nav-title { font-size: 16px; color: #e0e0e0; font-weight: 600; }

/* Container */
.container { max-width: 880px; margin: 0 auto; padding: 28px 24px; width: 100%; }

/* Input card */
.input-card {
  background: #16213e; border-radius: 12px; padding: 20px 24px;
  border: 1px solid #0f3460; margin-bottom: 24px;
}
.input-label {
  font-size: 13px; color: #888; margin-bottom: 10px;
}

/* Tag input */
.tag-wrap {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  min-height: 46px; padding: 8px 12px; background: #1a1a2e;
  border: 2px solid #0f3460; border-radius: 8px; cursor: text;
  transition: border-color .2s;
}
.tag-wrap:focus-within { border-color: #e94560; }
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 10px; background: #0f3460; border-radius: 6px;
  font-size: 13px; white-space: nowrap;
}
.tag .t-code { color: #3498db; }
.tag .t-name { color: #ccc; margin-left: 2px; }
.tag .t-rm {
  cursor: pointer; color: #555; font-size: 14px; margin-left: 2px;
  transition: color .15s; line-height: 1;
}
.tag .t-rm:hover { color: #e94560; }
.tag-ipt {
  flex: 1; min-width: 140px; border: none; outline: none;
  background: transparent; color: #fff; font-size: 14px;
}
.tag-ipt::placeholder { color: #444; }

/* Dropdown */
.dd {
  position: absolute; top: 100%; left: 0; right: 0;
  margin-top: 4px; background: #16213e; border: 1px solid #0f3460;
  border-radius: 8px; max-height: 260px; overflow-y: auto; z-index: 20;
  display: none;
}
.dd.show { display: block; }
.dd-item {
  padding: 10px 16px; cursor: pointer; font-size: 13px;
  display: flex; justify-content: space-between; align-items: center;
}
.dd-item:hover { background: #0f3460; }
.dd-item .dc { color: #3498db; }
.dd-item .dn { color: #aaa; font-size: 12px; margin-left: 6px; }

/* Actions */
.input-actions {
  display: flex; gap: 10px; margin-top: 14px; align-items: center;
}
.btn-go {
  padding: 10px 28px; background: #e94560; color: #fff; border: none;
  border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all .2s; white-space: nowrap; display: flex; align-items: center; gap: 8px;
}
.btn-go:hover:not(:disabled) { background: #c73850; }
.btn-go:disabled { background: #2a2a3e; color: #555; cursor: not-allowed; }
.btn-go .btn-spin {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite;
  display: none;
}
.btn-go.loading .btn-spin { display: inline-block; }
.btn-go.loading .btn-text { display: none; }

.btn-clr {
  padding: 10px 20px; background: transparent; color: #888; border: 1px solid #2a2a3e;
  border-radius: 8px; font-size: 14px; cursor: pointer; transition: all .2s;
}
.btn-clr:hover { border-color: #555; color: #ccc; }
.hint { font-size: 12px; color: #555; margin-left: auto; }

/* Loading overlay */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: rgba(26,26,46,.85); backdrop-filter: blur(4px);
  flex-direction: column; align-items: center; justify-content: center;
}
.overlay.active { display: flex; }
.ov-spin {
  width: 40px; height: 40px; border: 3px solid #0f3460;
  border-top-color: #e94560; border-radius: 50%;
  animation: spin .7s linear infinite; margin-bottom: 16px;
}
.ov-text { font-size: 14px; color: #888; }
.ov-sub { font-size: 12px; color: #555; margin-top: 6px; }
.ov-prog { width: 280px; height: 6px; background: #0f3460; border-radius: 3px; overflow: hidden; margin-top: 14px; }
.ov-prog > div { height: 100%; background: #e94560; border-radius: 3px; transition: width .3s ease; }
.ov-found { font-size: 13px; color: #e94560; margin-top: 8px; font-weight: 600; display: none; }
.ov-found.active { display: block; }

/* Live stock list in overlay */
.ov-list {
  width: 420px; max-width: 92vw; max-height: 280px;
  margin-top: 16px; overflow-y: auto; border-radius: 8px;
  background: rgba(22,33,62,.6); border: 1px solid #0f3460;
}
.ov-list::-webkit-scrollbar { width: 4px; }
.ov-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }
.ov-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; border-bottom: 1px solid rgba(15,52,96,.4);
  animation: ovFadeIn .25s ease;
}
.ov-item:last-child { border-bottom: none; }
.ov-item .oi-name { font-size: 13px; color: #e0e0e0; font-weight: 500; }
.ov-item .oi-name .oi-code { color: #3498db; font-size: 11px; font-weight: 400; margin-left: 4px; }
.ov-item .oi-right { display: flex; align-items: center; gap: 10px; }
.ov-item .oi-price { font-size: 11px; color: #888; }
.ov-item .oi-score { font-size: 18px; font-weight: 700; min-width: 32px; text-align: right; }
@keyframes ovFadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* Scan card */
.scan-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.scan-divider .line { flex: 1; height: 1px; background: #0f3460; }
.scan-divider span { font-size: 12px; color: #444; white-space: nowrap; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Results */
.result-wrap { }
.result-title {
  font-size: 14px; color: #888; margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.result-title strong { color: #e0e0e0; font-weight: 600; }

/* Row */
.row {
  position: relative;
  padding: 14px 14px 14px 18px;
  border-bottom: 1px solid rgba(15,52,96,.4);
  cursor: pointer; transition: background .15s;
  background: #16213e; border-radius: 10px; margin-bottom: 8px;
}
.row:hover { background: #1a2744; }
.row:last-child { border-bottom: none; margin-bottom: 0; }

.row-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 0 2px 2px 0;
}
.bar-g { background: #e74c3c; box-shadow: 1px 0 8px rgba(231,76,60,.25); }
.bar-y { background: #f39c12; box-shadow: 1px 0 8px rgba(243,156,18,.25); }
.bar-r { background: #2ecc71; box-shadow: 1px 0 8px rgba(46,204,113,.25); }
.bar-err { background: #888; box-shadow: none; }

.row-main {
  display: flex; align-items: center; gap: 14px;
}

.row-rank {
  width: 24px; text-align: center; font-size: 14px; font-weight: 700;
  color: #555; flex-shrink: 0;
}
.row-rank.r1 { color: #ffd700; }
.row-rank.r2 { color: #c0c0c0; }
.row-rank.r3 { color: #cd7f32; }

.row-body { flex: 1; min-width: 0; }
.row-name { font-size: 15px; font-weight: 600; }
.row-name .code { color: #3498db; font-size: 12px; font-weight: 400; margin-left: 4px; }
.row-sub { font-size: 12px; color: #666; margin-top: 2px; display: flex; gap: 10px; align-items: center; }

.row-right { flex-shrink: 0; text-align: right; }
.row-score { font-size: 28px; font-weight: 700; line-height: 1; }
.row-action { font-size: 11px; margin-top: 4px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.row-action.sc-h { background: rgba(231,76,60,.12); }
.row-action.sc-m { background: rgba(243,156,18,.12); }
.row-action.sc-l { background: rgba(46,204,113,.12); }

.row-goto {
  padding: 5px 12px; background: transparent; border: 1px solid #2a2a3e;
  border-radius: 6px; color: #888; font-size: 12px; cursor: pointer;
  transition: all .2s; white-space: nowrap;
}
.row-goto:hover { border-color: #e94560; color: #e94560; }

/* Chips */
.row-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
.chip {
  padding: 2px 7px; border-radius: 3px; font-size: 10px;
  display: inline-flex; align-items: center; gap: 2px;
  border: 1px solid transparent;
}
.chip.pos { background: rgba(231,76,60,.1); color: #e74c3c; border-color: rgba(231,76,60,.2); }
.chip.neg { background: rgba(46,204,113,.1); color: #2ecc71; border-color: rgba(46,204,113,.2); }
.chip.neu { background: rgba(255,255,255,.04); color: #666; border-color: rgba(255,255,255,.06); }
.chip .cn { opacity: .7; }

/* Expand */
.row-expand { display: none; padding: 12px 0 2px; animation: fadeIn .15s; }
.row-expand.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.dim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.dim-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px; border-radius: 4px; font-size: 11px;
  background: rgba(255,255,255,.02);
}
.dim-row .dn { color: #777; width: 56px; flex-shrink: 0; }
.dim-row .db {
  flex: 1; height: 3px; background: #0f3460; border-radius: 2px; overflow: hidden;
}
.dim-row .db > div { height: 100%; border-radius: 2px; transition: width .3s ease; }
.dim-row .dv { font-weight: 700; min-width: 28px; text-align: right; font-size: 12px; }

.expand-ft {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-top: 10px; gap: 12px; flex-wrap: wrap;
}
.expand-info { flex: 1; font-size: 11px; color: #888; line-height: 1.6; min-width: 200px; }
.expand-info .adv { font-size: 12px; font-weight: 600; margin-top: 4px; padding: 3px 8px; border-radius: 4px; display: inline-block; }
.expand-info .adv.high { color: #e74c3c; background: rgba(231,76,60,.08); }
.expand-info .adv.mid { color: #f39c12; background: rgba(243,156,18,.08); }
.expand-info .adv.low { color: #2ecc71; background: rgba(46,204,113,.08); }

/* Colors */
.sc-h { color: #e74c3c; text-shadow: 0 0 12px rgba(231,76,60,.3); }
.sc-m { color: #f39c12; text-shadow: 0 0 12px rgba(243,156,18,.3); }
.sc-l { color: #2ecc71; text-shadow: 0 0 12px rgba(46,204,113,.3); }

/* Empty */
.empty {
  text-align: center; padding: 80px 24px; color: #333;
}
.empty-icon { font-size: 42px; opacity: .35; margin-bottom: 12px; }
.empty p { font-size: 13px; }

/* Error */
.row-err { opacity: .4; cursor: default; }
.row-err:hover { background: none; border-radius: 0; }

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 16px; }
  .dim-grid { grid-template-columns: 1fr; }
  .row { gap: 10px; }
  .row-score { font-size: 22px; }
  .input-actions { flex-wrap: wrap; }
  .hint { margin-left: 0; }
}
</style>
</head>
<body>

<div class="nav">
  <button class="back-btn" onclick="location.href='/'">&#8592;</button>
  <span class="nav-title">股票推荐排序</span>
</div>

<div class="container">
  <!-- Input -->
  <div class="input-card">
    <div class="input-label">添加需要对比的股票</div>
    <div style="position:relative;">
      <div class="tag-wrap" id="tagWrap" onclick="document.getElementById('tagIpt').focus()">
        <input class="tag-ipt" id="tagIpt" type="text" placeholder="输入股票代码或名称搜索，回车添加..." autocomplete="off">
      </div>
      <div class="dd" id="dd"></div>
    </div>
    <div class="input-actions">
      <button class="btn-go" id="btnGo" onclick="doAnalyze()" disabled>
        <span class="btn-spin"></span>
        <span class="btn-text">开始分析</span>
      </button>
      <button class="btn-clr" onclick="clearAll()">清空</button>
      <span class="hint">已选 <strong id="cntHint">0</strong> 只</span>
    </div>
  </div>

  <!-- Full Scan -->
  <div class="scan-divider"><div class="line"></div><span>或</span><div class="line"></div></div>
  <div class="input-card">
    <div style="margin-bottom:12px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div style="font-size:15px; font-weight:600; color:#e0e0e0;">全量股票扫描</div>
          <div style="font-size:12px; color:#555; margin-top:3px;">扫描全市场股票，筛选高分标的并排序展示</div>
        </div>
        <button class="btn-clr" id="btnLoadHistory" onclick="loadHistoryResults()" style="font-size:12px;">查看历史结果</button>
      </div>
    </div>
    <div class="input-actions">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="font-size:13px; color:#888;">最低评分</span>
        <input type="number" id="minScore" value="0" min="0" max="100"
          style="width:70px; padding:7px 10px; background:#1a1a2e; border:1px solid #0f3460;
          border-radius:6px; color:#e0e0e0; font-size:14px; text-align:center; outline:none;">
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="font-size:13px; color:#888;">最高价格</span>
        <input type="number" id="maxPrice" value="10000" min="0" step="10"
          style="width:80px; padding:7px 10px; background:#1a1a2e; border:1px solid #0f3460;
          border-radius:6px; color:#e0e0e0; font-size:14px; text-align:center; outline:none;">
        <span style="font-size:11px; color:#555;">元</span>
      </div>
      <button class="btn-go" id="btnScan" onclick="doFullScan()">
        <span class="btn-spin"></span>
        <span class="btn-text">开始扫描</span>
      </button>
      <button class="btn-clr" id="btnRefresh" onclick="doRefresh()" style="display:none;">
        <span class="btn-spin"></span>
        <span class="btn-text">刷新数据</span>
      </button>
      <span class="hint" id="scanHint"></span>
    </div>
    <div id="scanTime" style="font-size:11px; color:#444; margin-top:8px; display:none;">
      上次扫描: <span id="lastScanTime"></span>
    </div>
  </div>

  <!-- Results -->
  <div class="result-wrap" id="resultWrap" style="display:none;">
    <div class="result-title"><span id="resultTitle"></span></div>
    <div id="resultList"></div>
  </div>

  <!-- Empty -->
  <div class="empty" id="emptyState">
    <div class="empty-icon">&#128200;</div>
    <p>添加股票后点击「开始分析」查看推荐排序</p>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="ov-spin"></div>
  <div class="ov-text" id="ovText">正在分析评分...</div>
  <div class="ov-sub" id="ovSub"></div>
  <div class="ov-prog" id="ovProg" style="display:none"><div id="ovProgBar" style="width:0%"></div></div>
  <div class="ov-found" id="ovFound"></div>
  <div class="ov-list" id="ovList"></div>
</div>

<script>
// State
let selected = [];
let loading = false;
let searchTimer;
const tagIpt = document.getElementById('tagIpt');
const tagWrap = document.getElementById('tagWrap');
const dd = document.getElementById('dd');
const btnGo = document.getElementById('btnGo');

// Search
tagIpt.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = tagIpt.value.trim();
  if (!q) { dd.classList.remove('show'); return; }
  searchTimer = setTimeout(() => doSearch(q), 200);
});

tagIpt.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const q = tagIpt.value.trim();
    if (q) doSearch(q, true);
  }
  if (e.key === 'Backspace' && !tagIpt.value && selected.length) {
    removeTag(selected[selected.length - 1].code);
  }
  if (e.key === 'Escape') dd.classList.remove('show');
});

document.addEventListener('click', e => {
  if (!e.target.closest('.tag-wrap') && !e.target.closest('.dd')) dd.classList.remove('show');
});

async function doSearch(q, autoAdd = false) {
  const resp = await fetch(`/api/stocks?q=${encodeURIComponent(q)}&page=1&size=10`);
  const data = (await resp.json()).data || [];
  if (autoAdd && data.length === 1) {
    addTag(data[0].code, data[0].name || '');
    tagIpt.value = '';
    dd.classList.remove('show');
    return;
  }
  if (!data.length) {
    dd.innerHTML = '<div class="dd-item" style="color:#444;pointer-events:none">无匹配结果</div>';
    dd.classList.add('show');
    return;
  }
  dd.innerHTML = data.map(s => {
    const c = s.pct_change >= 0 ? 'color:#e74c3c' : 'color:#2ecc71';
    const sg = s.pct_change >= 0 ? '+' : '';
    return `<div class="dd-item" data-c="${s.code}" data-n="${s.name||''}" onclick="pick(this)">
      <span><span class="dc">${s.code}</span><span class="dn">${s.name||''}</span></span>
      <span style="${c}">${sg}${s.pct_change.toFixed(2)}%</span>
    </div>`;
  }).join('');
  dd.classList.add('show');
}

function pick(el) {
  addTag(el.dataset.c, el.dataset.n);
  tagIpt.value = '';
  dd.classList.remove('show');
}

// Tags
function addTag(code, name) {
  if (selected.find(s => s.code === code)) return;
  selected.push({ code, name });
  renderTags();
}

function removeTag(code) {
  selected = selected.filter(s => s.code !== code);
  renderTags();
}

function renderTags() {
  tagWrap.querySelectorAll('.tag').forEach(t => t.remove());
  selected.forEach(s => {
    const t = document.createElement('span');
    t.className = 'tag';
    t.innerHTML = `<span class="t-code">${s.code}</span>${s.name ? `<span class="t-name">${s.name}</span>` : ''}<span class="t-rm" onclick="removeTag('${s.code}')">&times;</span>`;
    tagWrap.insertBefore(t, tagIpt);
  });
  document.getElementById('cntHint').textContent = selected.length;
  btnGo.disabled = selected.length === 0;
}

function clearAll() {
  selected = [];
  renderTags();
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('emptyState').style.display = '';
}

// Analyze
async function doAnalyze() {
  if (loading || !selected.length) return;
  loading = true;

  const ov = document.getElementById('overlay');
  document.getElementById('ovText').textContent = '正在分析评分...';
  document.getElementById('ovSub').textContent = selected.length + ' 只股票';
  ov.classList.add('active');
  btnGo.classList.add('loading');
  btnGo.disabled = true;

  try {
    const resp = await fetch('/api/batch-score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(selected.map(s => s.code)),
    });
    const results = await resp.json();
    renderResults(results);
  } catch (err) {
    alert('分析失败: ' + err.message);
  } finally {
    ov.classList.remove('active');
    btnGo.classList.remove('loading');
    btnGo.disabled = selected.length === 0;
    loading = false;
  }
}

// Render
function sCls(v) { return v >= 63 ? 'sc-h' : v >= 40 ? 'sc-m' : 'sc-l'; }
function bCls(v) { return v >= 63 ? 'bar-g' : v >= 40 ? 'bar-y' : 'bar-r'; }
function aCls(v) { return v >= 63 ? 'high' : v >= 40 ? 'mid' : 'low'; }

function renderResults(results) {
  const valid = results.filter(r => !r.error);
  const errors = results.filter(r => r.error);

  document.getElementById('emptyState').style.display = 'none';
  const wrap = document.getElementById('resultWrap');
  wrap.style.display = '';
  document.getElementById('resultTitle').innerHTML =
    `<strong>分析结果</strong> 共 ${results.length} 只${errors.length ? `，${errors.length} 只无数据` : ''}`;

  let h = '';

  errors.forEach(r => {
    h += `<div class="row row-err">
      <div class="row-bar bar-err"></div>
      <div class="row-main">
        <div class="row-rank">-</div>
        <div class="row-body">
          <div class="row-name">${r.code} <span style="color:#e74c3c;font-size:11px;font-weight:400;">${r.error}</span></div>
        </div>
      </div>
    </div>`;
  });

  valid.forEach((r, i) => {
    const rank = i + 1;
    const rc = rank <= 3 ? ` r${rank}` : '';
    const pc = r.pct_change >= 0 ? 'color:#e74c3c' : 'color:#2ecc71';
    const ps = r.pct_change >= 0 ? '+' : '';
    const sc = sCls(r.total);

    const top4 = [...(r.dimensions || [])].sort((a, b) => Math.abs(b.score) - Math.abs(a.score)).slice(0, 4);
    const chips = top4.map(d => {
      const cc = d.score > 0 ? 'pos' : d.score < 0 ? 'neg' : 'neu';
      return `<span class="chip ${cc}"><span class="cn">${d.name}</span>${d.score > 0 ? '+' : ''}${d.score}</span>`;
    }).join('');

    const dims = (r.dimensions || []).map(d => {
      const p = Math.min(Math.abs(d.score) / 10 * 100, 100);
      let bc;
      if (d.score >= 5) bc = '#e74c3c';
      else if (d.score > 0) bc = '#ec7063';
      else if (d.score === 0) bc = '#555';
      else if (d.score > -5) bc = '#58d68d';
      else bc = '#2ecc71';
      const vc = d.score > 0 ? 'sc-h' : d.score < 0 ? 'sc-l' : '';
      return `<div class="dim-row">
        <span class="dn">${d.name}</span>
        <div class="db"><div style="width:${p}%;background:${bc}"></div></div>
        <span class="dv ${vc}">${d.score > 0 ? '+' : ''}${d.score}</span>
      </div>`;
    }).join('');

    h += `<div class="row" onclick="toggleExp('${r.code}')">
      <div class="row-bar ${bCls(r.total)}"></div>
      <div class="row-main">
        <div class="row-rank${rc}">${rank}</div>
        <div class="row-body">
          <div class="row-name">${r.name || r.code}<span class="code">${r.code}</span></div>
          <div class="row-sub">
            <span style="color:#999">现价 ${r.close}</span>
            <span style="${pc};font-weight:600">${ps}${r.pct_change.toFixed(2)}%</span>
          </div>
          <div class="row-chips">${chips}</div>
        </div>
        <div class="row-right">
          <div class="row-score ${sc}">${r.total}</div>
          <div class="row-action ${sc}">${r.action || ''}</div>
        </div>
      </div>
      <div class="row-expand" id="exp-${r.code}">
        <div class="dim-grid">${dims}</div>
        <div class="expand-ft">
          <div class="expand-info">
            ${r.summary || ''}
            ${r.hold_advice ? `<div class="adv ${aCls(r.total)}">${r.hold_advice}</div>` : ''}
          </div>
          <button class="row-goto" onclick="event.stopPropagation();window.open('/stock/${r.code}','_blank')">查看K线 &#8599;</button>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('resultList').innerHTML = h;
}

function toggleExp(code) {
  const el = document.getElementById('exp-' + code);
  if (el) el.classList.toggle('active');
}

// === Full Scan ===
let scanTimer = null;

// Load persisted results from disk
async function loadHistoryResults() {
  const minScore = parseInt(document.getElementById('minScore').value) || 0;
  const maxPrice = parseFloat(document.getElementById('maxPrice').value) || 10000;

  try {
    const resp = await fetch(`/api/score/results?min_score=${minScore}&max_price=${maxPrice}&page=1&size=1000`);
    const data = await resp.json();

    if (data.scan_time) {
      document.getElementById('lastScanTime').textContent = new Date(data.scan_time).toLocaleString('zh-CN');
      document.getElementById('scanTime').style.display = 'block';
      document.getElementById('btnRefresh').style.display = 'inline-block';
    }

    if (data.results && data.results.length > 0) {
      renderResults(data.results);
      document.getElementById('scanHint').textContent = `共 ${data.total} 只股票`;
    } else {
      document.getElementById('scanHint').textContent = '暂无历史评分数据，请先进行全量扫描';
    }
  } catch (err) {
    alert('加载历史结果失败: ' + err.message);
  }
}

async function doFullScan() {
  const minScore = parseInt(document.getElementById('minScore').value) || 0;
  const maxPrice = parseFloat(document.getElementById('maxPrice').value) || 10000;
  const btn = document.getElementById('btnScan');
  btn.classList.add('loading');
  btn.disabled = true;

  const ov = document.getElementById('overlay');
  document.getElementById('ovText').textContent = '正在全量扫描...';
  document.getElementById('ovSub').textContent = '准备中...';
  const prog = document.getElementById('ovProg');
  const progBar = document.getElementById('ovProgBar');
  const found = document.getElementById('ovFound');
  prog.style.display = 'block';
  progBar.style.width = '0%';
  found.classList.remove('active');
  ov.classList.add('active');

  try {
    const resp = await fetch('/api/full-scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ min_score: minScore, max_price: maxPrice }),
    });
    await resp.json();
    scanTimer = setInterval(pollScanStatus, 800);
  } catch (err) {
    alert('启动扫描失败: ' + err.message);
    btn.classList.remove('loading');
    btn.disabled = false;
    ov.classList.remove('active');
    prog.style.display = 'none';
  }
}

async function doRefresh() {
  const minScore = parseInt(document.getElementById('minScore').value) || 0;
  const maxPrice = parseFloat(document.getElementById('maxPrice').value) || 10000;
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('loading');
  btn.disabled = true;

  const ov = document.getElementById('overlay');
  document.getElementById('ovText').textContent = '正在刷新评分数据...';
  document.getElementById('ovSub').textContent = '检查更新中...';
  const prog = document.getElementById('ovProg');
  const progBar = document.getElementById('ovProgBar');
  prog.style.display = 'block';
  progBar.style.width = '0%';
  ov.classList.add('active');

  try {
    const resp = await fetch('/api/score/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ min_score: minScore, max_price: maxPrice }),
    });
    const result = await resp.json();

    if (result.status === 'not_found') {
      alert('暂无评分数据，请先运行全量扫描');
      btn.classList.remove('loading');
      btn.disabled = false;
      ov.classList.remove('active');
      prog.style.display = 'none';
      return;
    }

    scanTimer = setInterval(pollScanStatus, 800);
  } catch (err) {
    alert('启动刷新失败: ' + err.message);
    btn.classList.remove('loading');
    btn.disabled = false;
    ov.classList.remove('active');
    prog.style.display = 'none';
  }
}

async function pollScanStatus() {
  try {
    const resp = await fetch('/api/score/scan/status');
    const d = await resp.json();
    const pct = d.total > 0 ? (d.current / d.total * 100).toFixed(1) : 0;
    document.getElementById('ovSub').textContent = `${d.current} / ${d.total} — ${d.code}`;
    document.getElementById('ovProgBar').style.width = pct + '%';
    // Render live stock list
    const listEl = document.getElementById('ovList');
    if (d.results && d.results.length > 0) {
      const sorted = [...d.results].sort((a, b) => (b.total || 0) - (a.total || 0));
      const prevLen = listEl.children.length;
      if (sorted.length !== prevLen) {
        listEl.innerHTML = sorted.map(r => {
          const sc = sCls(r.total || 0);
          const pc = (r.pct_change || 0) >= 0 ? 'color:#e74c3c' : 'color:#2ecc71';
          const ps = (r.pct_change || 0) >= 0 ? '+' : '';
          return `<div class="ov-item">
            <div class="oi-name">${r.name || r.code}<span class="oi-code">${r.code}</span></div>
            <div class="oi-right">
              <span class="oi-price" style="${pc}">${r.close || ''}${r.pct_change != null ? ' ' + ps + r.pct_change.toFixed(2) + '%' : ''}</span>
              <span class="oi-score ${sc}">${r.total || 0}</span>
            </div>
          </div>`;
        }).join('');
        listEl.scrollTop = listEl.scrollHeight;
      }
    }
    if (!d.running && d.done) {
      clearInterval(scanTimer);
      scanTimer = null;
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('ovProg').style.display = 'none';
      document.getElementById('ovFound').classList.remove('active');
      listEl.innerHTML = '';

      document.getElementById('btnScan').classList.remove('loading');
      document.getElementById('btnScan').disabled = false;
      document.getElementById('btnRefresh').classList.remove('loading');
      document.getElementById('btnRefresh').disabled = false;
      document.getElementById('scanHint').textContent = d.message || '完成';

      // Update scan time
      document.getElementById('lastScanTime').textContent = new Date().toLocaleString('zh-CN');
      document.getElementById('scanTime').style.display = 'block';
      document.getElementById('btnRefresh').style.display = 'inline-block';

      if (d.results && d.results.length) {
        renderResults(d.results);
      }
    }
  } catch (err) {
    console.error('Poll error:', err);
  }
}
</script>
