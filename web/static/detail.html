<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股K线分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; overflow: hidden; }
.top-bar {
  background: #16213e; border-bottom: 1px solid #0f3460;
  padding: 6px 20px;
}
.top-row {
  display: flex; align-items: center; gap: 14px;
}
.top-row h1 { font-size: 16px; color: #e94560; white-space: nowrap; }
.search-box { position: relative; flex-shrink: 0; }
.search-box input {
  width: 180px; padding: 4px 10px; background: #0f3460; border: 1px solid #2a2a4a;
  border-radius: 4px; color: #fff; font-size: 13px; outline: none;
}
.search-box input:focus { border-color: #e94560; }
.dropdown {
  position: absolute; top: calc(100% + 2px); left: 0; width: 260px; max-height: 260px;
  overflow-y: auto; background: #16213e; border: 1px solid #2a2a4a;
  border-radius: 4px; z-index: 100; display: none; box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
.dropdown.show { display: block; }
.dropdown-item { padding: 5px 12px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
.dropdown-item:hover { background: #0f3460; }
.price-area { display: flex; align-items: baseline; gap: 8px; }
.price-area .price { font-size: 20px; font-weight: 600; }
.price-area .chg { font-size: 13px; }
.up { color: #e74c3c; }
.down { color: #2ecc71; }
.info-grid {
  display: flex; flex-wrap: wrap; gap: 4px 0;
  margin-top: 4px; font-size: 12px; line-height: 1.8;
}
.info-grid .g { display: flex; align-items: center; gap: 3px; margin-right: 12px; }
.info-grid .l { color: #555; font-size: 11px; }
.info-grid .v { color: #bbb; }
.info-grid .sep {
  width: 1px; height: 14px; background: #2a2a4a; margin: 0 8px; align-self: center;
}
#chart { width: 100%; height: calc(100vh - 68px); }

/* Intraday modal */
.intraday-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.7);
}
.intraday-overlay.active { display: block; }
.intraday-box {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 92vw; height: 82vh; background: #1a1a2e; border: 1px solid #0f3460;
  border-radius: 8px; display: flex; flex-direction: column;
}
.intraday-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px; border-bottom: 1px solid #2a2a4a;
}
.intraday-header .title-area { display: flex; align-items: center; gap: 12px; }
.intraday-header .date-title { color: #e94560; font-size: 15px; font-weight: 600; }
.intraday-header .nav-hint { color: #555; font-size: 11px; }
.mode-btns { display: flex; gap: 4px; }
.mode-btn {
  padding: 4px 12px; border-radius: 4px; border: 1px solid #2a2a4a;
  background: #0f3460; color: #888; font-size: 12px; cursor: pointer;
  transition: all .15s;
}
.mode-btn:hover { border-color: #e94560; }
.mode-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
.close-btn {
  background: none; border: none; color: #666; font-size: 22px; cursor: pointer;
  padding: 0 4px; line-height: 1;
}
.close-btn:hover { color: #e94560; }
#intradayChart { flex: 1; min-height: 0; }

/* Global loading overlay */
.global-loading {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(26,26,46,.8); justify-content: center; align-items: center;
}
.global-loading.active { display: flex; }
.spinner {
  width: 36px; height: 36px; border: 3px solid #2a2a4a; border-top-color: #e94560;
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.global-loading .loading-text {
  color: #888; font-size: 13px; margin-top: 10px;
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-row">
    <h1><a href="/" style="color:#e94560;text-decoration:none">A股K线</a> <span id="stockName" style="color:#e0e0e0;font-weight:normal;font-size:14px"></span></h1>
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="股票代码..." autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>
    <div class="price-area" id="priceArea"></div>
  </div>
  <div class="info-grid" id="infoGrid"></div>
</div>

<div id="chart"></div>

<!-- Global loading -->
<div class="global-loading" id="globalLoading">
  <div style="text-align:center">
    <div class="spinner"></div>
    <div class="loading-text">加载中...</div>
  </div>
</div>

<!-- Intraday modal -->
<div class="intraday-overlay" id="intradayModal">
  <div class="intraday-box">
    <div class="intraday-header">
      <div class="title-area">
        <span class="date-title" id="intradayTitle"></span>
        <span class="nav-hint">← → 切换日期</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="mode-btns">
          <button class="mode-btn active" data-mode="timeline" onclick="switchMode('timeline')">分时</button>
          <button class="mode-btn" data-mode="k5" onclick="switchMode('k5')">5分K</button>
          <button class="mode-btn" data-mode="k15" onclick="switchMode('k15')">15分K</button>
        </div>
        <button class="close-btn" id="intradayClose">&times;</button>
      </div>
    </div>
    <div id="intradayChart"></div>
  </div>
</div>

<script>
// === Debounce utility ===
function debounce(fn, delay) {
  let timer = null;
  return function(...args) {
    if (timer) return;
    timer = setTimeout(() => { timer = null; }, delay);
    fn.apply(this, args);
  };
}

// === Global loading ===
function showLoading(text) {
  const el = document.getElementById('globalLoading');
  if (text) el.querySelector('.loading-text').textContent = text;
  else el.querySelector('.loading-text').textContent = '加载中...';
  el.classList.add('active');
}
function hideLoading() {
  document.getElementById('globalLoading').classList.remove('active');
}

const chart = echarts.init(document.getElementById('chart'), 'dark');
const UP = '#e74c3c', DN = '#2ecc71';
const MA_C = ['#f1c40f','#e67e22','#9b59b6','#3498db'];

let currentCode = '', currentName = '', rawData = null;
const searchInput = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');
let searchTimer;

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(searchInput.value.trim()), 300);
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const v = searchInput.value.trim();
    if (v && /^\d+$/.test(v)) { debouncedLoad(v); dropdown.classList.remove('show'); }
  }
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) dropdown.classList.remove('show');
});

// Debounced loadStock for search
const debouncedLoad = debounce(code => loadStock(code), 500);

async function doSearch(q) {
  if (!q) { dropdown.classList.remove('show'); return; }
  const resp = await fetch(`/api/stocks?q=${q}&size=20`);
  const json = await resp.json();
  const stocks = json.data;
  if (!stocks.length) { dropdown.classList.remove('show'); return; }
  dropdown.innerHTML = stocks.map(s => {
    const cls = s.pct_change >= 0 ? 'up' : 'down';
    const sign = s.pct_change >= 0 ? '+' : '';
    const name = s.name || '';
    return `<div class="dropdown-item" onclick="debouncedLoad('${s.code}')">
      <span>${s.code}${name ? ' '+name : ''}</span><span class="${cls}">${s.close} ${sign}${s.pct_change}%</span>
    </div>`;
  }).join('');
  dropdown.classList.add('show');
}

const C = {date:0,open:1,close:2,high:3,low:4,vol:5,pct:6,ma5:7,ma7:8,ma10:9,ma20:10,dif:11,dea:12,hist:13,k:14,d:15,j:16};
function R(rows,i) {
  const r=rows[i];
  return {date:r[C.date],open:r[C.open],close:r[C.close],high:r[C.high],low:r[C.low],
    vol:r[C.vol],pct:r[C.pct],ma5:r[C.ma5],ma7:r[C.ma7],ma10:r[C.ma10],ma20:r[C.ma20],
    dif:r[C.dif],dea:r[C.dea],hist:r[C.hist],k:r[C.k],d:r[C.d],j:r[C.j]};
}

async function loadStock(code) {
  code = code.padStart(6,'0');
  currentCode = code;
  searchInput.value = code;
  window.history.replaceState(null, '', `/stock/${code}`);
  dropdown.classList.remove('show');
  showLoading();
  try {
    const resp = await fetch(`/api/stock/${code}`);
    rawData = await resp.json();
    if (rawData.error) { alert(rawData.error); return; }
    currentName = rawData.name || '';
    document.getElementById('stockName').textContent = currentName ? currentName : '';
    document.title = currentName ? `${currentName}(${currentCode}) - A股K线` : `${currentCode} - A股K线`;
    renderChart();
    renderInfo();
  } catch(e) {
    console.error('loadStock failed:', e);
  } finally {
    hideLoading();
  }
}

function fmtVol(v) {
  if (!v) return '-';
  if (v >= 1e8) return (v/1e8).toFixed(1)+'亿';
  if (v >= 1e4) return (v/1e4).toFixed(0)+'万';
  return v.toString();
}

function renderInfo() {
  const rows = rawData.data;
  const i = rows.length - 1;
  const d = R(rows, i);
  const prev = i > 0 ? R(rows, i - 1) : d;
  const pct = d.pct || ((d.close-prev.close)/prev.close*100);
  const cls = pct >= 0 ? 'up' : 'down';
  const s = pct >= 0 ? '+' : '';
  const chg = (d.close - prev.close).toFixed(2);

  document.getElementById('priceArea').innerHTML =
    `<span class="price ${cls}">${d.close.toFixed(2)}</span>` +
    `<span class="chg ${cls}">${s}${chg} (${s}${pct.toFixed(2)}%)</span>`;

  const g = (l, v, c) => `<span class="g"><span class="l">${l}</span><span class="v" ${c?'style="color:'+c+'"':''}>${v}</span></span>`;
  const sep = '<span class="sep"></span>';
  document.getElementById('infoGrid').innerHTML =
    g('开', d.open.toFixed(2)) + g('高', d.high.toFixed(2)) + g('低', d.low.toFixed(2)) + g('量', fmtVol(d.vol)) + sep +
    g('MA5', d.ma5?.toFixed(2)||'-', MA_C[0]) + g('MA10', d.ma10?.toFixed(2)||'-', MA_C[2]) + g('MA20', d.ma20?.toFixed(2)||'-', MA_C[3]) + sep +
    g('DIF', d.dif?.toFixed(3)||'-','#f1c40f') + g('DEA', d.dea?.toFixed(3)||'-','#3498db') + g('MACD', d.hist?.toFixed(3)||'-') + sep +
    g('K', d.k?.toFixed(3)||'-','#f1c40f') + g('D', d.d?.toFixed(3)||'-','#3498db') + g('J', d.j?.toFixed(3)||'-','#e74c3c');
}

function renderChart() {
  const rows = rawData.data, len = rows.length;
  const dates=[], ohlc=[], vols=[], ma5=[],ma7=[],ma10=[],ma20=[];
  const dif=[],dea=[],hist=[], kdjK=[],kdjD=[],kdjJ=[];

  for (let i=0; i<len; i++) {
    const d = R(rows,i);
    dates[i]=d.date;
    ohlc[i]=[d.open,d.close,d.low,d.high];
    vols[i]={value:d.vol||0, itemStyle:{color:d.close>=d.open?UP:DN,opacity:.6}};
    ma5[i]=d.ma5; ma7[i]=d.ma7; ma10[i]=d.ma10; ma20[i]=d.ma20;
    dif[i]=d.dif; dea[i]=d.dea;
    hist[i]={value:d.hist, itemStyle:{color:d.hist>=0?UP:DN}};
    kdjK[i]=d.k; kdjD[i]=d.d; kdjJ[i]=d.j;
  }

  const mkX = (gi, showLabel) => ({
    type:'category', data:dates, gridIndex:gi, boundaryGap:true,
    axisLine:{lineStyle:{color:'#2a2a3a'}}, axisTick:{show:false},
    axisLabel: showLabel ? {color:'#555',fontSize:10} : {show:false}
  });
  const mkY = (gi, fmt) => ({
    scale:true, gridIndex:gi, splitLine:{lineStyle:{color:'#1e1e30'}},
    axisLabel:{color:'#555',fontSize:10, formatter:fmt}
  });

  chart.setOption({
    backgroundColor:'#1a1a2e',
    animation:false,
    axisPointer:{link:[{xAxisIndex:'all'}]},
    title:[
      {text:'K线 (双击查看分时)', left:70, top:8, textStyle:{color:'#555',fontSize:11,fontWeight:'normal'}},
      {text:'MA5', left:200, top:8, textStyle:{color:'#f1c40f',fontSize:11,fontWeight:'normal'}},
      {text:'MA10', left:238, top:8, textStyle:{color:'#9b59b6',fontSize:11,fontWeight:'normal'}},
      {text:'MA20', left:286, top:8, textStyle:{color:'#3498db',fontSize:11,fontWeight:'normal'}},
      {text:`VOL  ${fmtVol(R(rows,rows.length-1).vol)}`, left:70, top:'49.5%', textStyle:{color:'#555',fontSize:11,fontWeight:'normal'}},
      {text:'MACD (12,26,9)', left:70, top:'63.5%', textStyle:{color:'#555',fontSize:11,fontWeight:'normal'}},
      {text:'KDJ (9,3,3)', left:70, top:'81.5%', textStyle:{color:'#555',fontSize:11,fontWeight:'normal'}},
    ],
    tooltip:{
      trigger:'axis',
      axisPointer:{type:'line', lineStyle:{color:'#555',type:'dashed',width:1}},
      backgroundColor:'rgba(22,33,62,.95)', borderWidth:1, borderColor:'#2a2a4a',
      padding:[8,12],
      textStyle:{color:'#e0e0e0',fontSize:12},
      formatter:function(p){
        if(!p||!p.length) return '';
        const d = R(rows, p[0].dataIndex);
        const pct = d.pct||0;
        const c = pct>=0?'#e74c3c':'#2ecc71';
        const lb='color:#555;font-size:11px;padding-right:4px;white-space:nowrap';
        const vl=(vc)=>`color:${vc||'#bbb'};white-space:nowrap`;
        return `<table style="font-size:12px;line-height:1.7;border-spacing:0">
          <tr><td colspan="6" style="padding-bottom:3px;border-bottom:1px solid #2a2a4a"><b>${d.date}</b></td></tr>
          <tr>
            <td style="${lb}">开</td><td style="${vl()}">${d.open.toFixed(2)}</td>
            <td style="${lb};padding-left:10px">高</td><td style="${vl()}">${d.high.toFixed(2)}</td>
            <td style="${lb};padding-left:10px">低</td><td style="${vl()}">${d.low.toFixed(2)}</td>
          </tr>
          <tr>
            <td style="${lb}">收</td><td style="${vl(c)}">${d.close.toFixed(2)}</td>
            <td style="${lb};padding-left:10px">量</td><td style="${vl()}">${fmtVol(d.vol)}</td>
            <td style="${lb};padding-left:10px">幅</td><td style="${vl(c)}">${pct>=0?'+':''}${pct.toFixed(2)}%</td>
          </tr>
          <tr><td colspan="6" style="padding-top:2px;border-top:1px solid #2a2a4a"></td></tr>
          <tr>
            <td style="${lb}">MA5</td><td style="${vl('#f1c40f')}">${d.ma5?.toFixed(2)||'-'}</td>
            <td style="${lb};padding-left:10px">MA10</td><td style="${vl('#9b59b6')}">${d.ma10?.toFixed(2)||'-'}</td>
            <td style="${lb};padding-left:10px">MA20</td><td style="${vl('#3498db')}">${d.ma20?.toFixed(2)||'-'}</td>
          </tr>
          <tr>
            <td style="${lb}">DIF</td><td style="${vl('#f1c40f')}">${d.dif?.toFixed(3)||'-'}</td>
            <td style="${lb};padding-left:10px">DEA</td><td style="${vl('#3498db')}">${d.dea?.toFixed(3)||'-'}</td>
            <td style="${lb};padding-left:10px">MACD</td><td style="${vl()}">${d.hist?.toFixed(3)||'-'}</td>
          </tr>
          <tr>
            <td style="${lb}">K</td><td style="${vl('#f1c40f')}">${d.k?.toFixed(3)||'-'}</td>
            <td style="${lb};padding-left:10px">D</td><td style="${vl('#3498db')}">${d.d?.toFixed(3)||'-'}</td>
            <td style="${lb};padding-left:10px">J</td><td style="${vl('#e74c3c')}">${d.j?.toFixed(3)||'-'}</td>
          </tr>
        </table>`;
      }
    },
    grid:[
      {left:65,right:65,top:28,height:'42%'},
      {left:65,right:65,top:'50%',height:'10%'},
      {left:65,right:65,top:'64%',height:'14%'},
      {left:65,right:65,top:'82%',height:'14%'},
    ],
    xAxis:[mkX(0,true),mkX(1),mkX(2),mkX(3)],
    yAxis:[
      {...mkY(0), axisPointer:{show:true,type:'line',lineStyle:{color:'#555',type:'dashed',width:1}}},
      mkY(1,v=>fmtVol(v)), mkY(2), mkY(3)
    ],
    dataZoom:[{type:'inside',xAxisIndex:[0,1,2,3],start:Math.max(0,(1-120/len)*100),end:100,zoomOnMouseWheel:false,moveOnMouseWheel:false,moveOnMouseMove:false}],
    series:[
      {name:'K线',type:'candlestick',xAxisIndex:0,yAxisIndex:0,data:ohlc,itemStyle:{color:UP,color0:DN,borderColor:UP,borderColor0:DN}},
      {name:'MA5',type:'line',xAxisIndex:0,yAxisIndex:0,data:ma5,symbol:'none',silent:true,lineStyle:{width:1,color:MA_C[0]}},
      {name:'MA10',type:'line',xAxisIndex:0,yAxisIndex:0,data:ma10,symbol:'none',silent:true,lineStyle:{width:1,color:MA_C[2]}},
      {name:'MA20',type:'line',xAxisIndex:0,yAxisIndex:0,data:ma20,symbol:'none',silent:true,lineStyle:{width:1,color:MA_C[3]}},
      {name:'成交量',type:'bar',xAxisIndex:1,yAxisIndex:1,data:vols},
      {name:'MACD柱',type:'bar',xAxisIndex:2,yAxisIndex:2,data:hist},
      {name:'DIF',type:'line',xAxisIndex:2,yAxisIndex:2,data:dif,symbol:'none',silent:true,lineStyle:{width:1,color:'#f1c40f'}},
      {name:'DEA',type:'line',xAxisIndex:2,yAxisIndex:2,data:dea,symbol:'none',silent:true,lineStyle:{width:1,color:'#3498db'}},
      {name:'K',type:'line',xAxisIndex:3,yAxisIndex:3,data:kdjK,symbol:'none',silent:true,lineStyle:{width:1,color:'#f1c40f'}},
      {name:'D',type:'line',xAxisIndex:3,yAxisIndex:3,data:kdjD,symbol:'none',silent:true,lineStyle:{width:1,color:'#3498db'}},
      {name:'J',type:'line',xAxisIndex:3,yAxisIndex:3,data:kdjJ,symbol:'none',silent:true,lineStyle:{width:1,color:'#e74c3c'}},
    ],
  }, true);
}

window.addEventListener('resize', () => {
  chart.resize();
  if (intradayChart) intradayChart.resize();
});

chart.getZr().on('mousewheel', function(e) {
  e.event.preventDefault();
  const dz = chart.getOption().dataZoom[0];
  const s = dz.start, en = dz.end, range = en - s;
  const dx = e.event.deltaX, dy = e.event.deltaY;
  if (Math.abs(dx) > Math.abs(dy) && !e.event.ctrlKey) {
    const step = range * .05 * Math.sign(dx);
    const ns = Math.max(0, Math.min(100 - range, s + step));
    chart.dispatchAction({type:'dataZoom', start:ns, end:ns+range});
  } else {
    const f = e.event.ctrlKey ? (dy>0?1.1:.9) : (dy>0?1.05:.95);
    const nr = Math.max(1, range * f);
    const c = (s+en)/2;
    chart.dispatchAction({type:'dataZoom', start:Math.max(0,c-nr/2), end:Math.min(100,c+nr/2)});
  }
});

// === Intraday (分时图) ===
let intradayChart = null;
let intradayMode = 'timeline';  // 'timeline' | 'k5' | 'k1'
let intradayDateIndex = -1;     // index into rawData.data dates
let intradayDates = [];          // cached date list from rawData
let intradayCache = {};          // freq -> JSON data cache

function _getAllDates() {
  if (!rawData || !rawData.data) return [];
  return rawData.data.map(r => r[C.date]);
}

function _freqForMode(mode) {
  if (mode === 'k15') return '15';
  return '5';
}

// Double-click K-line candle -> open intraday
chart.on('dblclick', function(params) {
  if (!params || params.componentType !== 'series' || params.seriesName !== 'K线') return;
  if (!rawData || !rawData.data) return;
  const idx = params.dataIndex;
  const dateStr = rawData.data[idx][C.date];
  showLoading();
  openIntraday(dateStr, idx);
});

async function openIntraday(dateStr, dateIdx) {
  intradayDates = _getAllDates();
  intradayDateIndex = dateIdx !== undefined ? dateIdx : intradayDates.indexOf(dateStr);
  if (intradayDateIndex < 0) { hideLoading(); return; }
  intradayCache = {};
  intradayMode = 'timeline';
  updateModeButtons();

  const modal = document.getElementById('intradayModal');
  modal.classList.add('active');
  updateIntradayTitle();

  // Create echarts instance
  const container = document.getElementById('intradayChart');
  if (intradayChart) { intradayChart.dispose(); intradayChart = null; }
  intradayChart = echarts.init(container, 'dark');

  await loadAndRenderIntraday();
}

function updateIntradayTitle() {
  const dateStr = intradayDates[intradayDateIndex] || '';
  const label = currentName ? `${currentCode} ${currentName}` : currentCode;
  document.getElementById('intradayTitle').textContent = `${label} · ${dateStr}`;
}

function updateModeButtons() {
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === intradayMode);
  });
}

async function loadAndRenderIntraday() {
  const dateStr = intradayDates[intradayDateIndex];
  if (!dateStr) return;
  const freq = _freqForMode(intradayMode);
  const cacheKey = `${dateStr}_${freq}`;

  if (!intradayCache[cacheKey]) {
    showLoading();
    try {
      const resp = await fetch(`/api/intraday/${currentCode}/${dateStr}?freq=${freq}`);
      const data = await resp.json();
      if (data.error) {
        hideLoading();
        intradayChart.setOption({
          title:{text:data.error, left:'center', top:'center', textStyle:{color:'#888',fontSize:14}}
        }, true);
        return;
      }
      intradayCache[cacheKey] = data;
    } catch(e) {
      hideLoading();
      return;
    }
    hideLoading();
  }

  const data = intradayCache[cacheKey];
  // Reference price: previous day's close (昨收)
  let refPrice = null;
  if (rawData && rawData.data && intradayDateIndex > 0) {
    refPrice = R(rawData.data, intradayDateIndex - 1).close;
  }
  if (intradayMode === 'timeline') {
    renderTimeline(data, refPrice);
  } else {
    renderIntradayKline(data, refPrice);
  }
}

// --- Timeline (分时图) ---
function renderTimeline(data, refPrice) {
  const rows = data.data, len = rows.length;
  if (!len) return;

  // Column indices
  const ci = {};
  data.columns.forEach((c, i) => ci[c] = i);

  const times=[], prices=[], vols=[], ma20=[], dif=[], dea=[], hist=[];
  const openPrice = refPrice || rows[0][ci.open]; // 昨收价 or fallback to first bar open

  for (let i=0; i<len; i++) {
    const r = rows[i];
    times[i] = r[ci.time];
    prices[i] = r[ci.close];
    vols[i] = {value: r[ci.volume]||0, itemStyle:{color:(r[ci.close]||0)>=(r[ci.open]||0)?UP:DN,opacity:.6}};
    ma20[i] = r[ci.ma20];
    dif[i] = r[ci.macd_dif];
    dea[i] = r[ci.macd_dea];
    hist[i] = {value: r[ci.macd_hist], itemStyle:{color:(r[ci.macd_hist]||0)>=0?UP:DN}};
  }
  // Split prices into up (red) and down (green) for 0-axis coloring
  const pricesUp = new Array(len).fill(null);
  const pricesDn = new Array(len).fill(null);
  for (let i = 0; i < len; i++) {
    if (prices[i] >= openPrice) pricesUp[i] = prices[i];
    else pricesDn[i] = prices[i];
  }
  for (let i = 1; i < len; i++) {
    if (prices[i-1] >= openPrice && prices[i] < openPrice) {
      pricesUp[i] = openPrice;
      pricesDn[i] = openPrice;
    } else if (prices[i-1] < openPrice && prices[i] >= openPrice) {
      pricesDn[i] = openPrice;
      pricesUp[i] = openPrice;
    }
  }
  // Show first bar as 09:30 (market open)
  if (times[0] === '09:35') times[0] = '09:30';

  // Symmetric range around openPrice for price & percentage axes
  const maxDev = Math.max(
    Math.max(...prices.map(p => Math.abs((p||0) - openPrice))),
    openPrice * 0.01
  );
  const priceMin = openPrice - maxDev;
  const priceMax = openPrice + maxDev;
  const pctMin = -maxDev / openPrice * 100;
  const pctMax = maxDev / openPrice * 100;

  intradayChart.setOption({
    backgroundColor:'#1a1a2e',
    animation:false,
    axisPointer:{link:[{xAxisIndex:'all'}]},
    title:[
      {text:'分时',left:70,top:6,textStyle:{color:'#555',fontSize:11,fontWeight:'normal'}},
      {text:'均价',left:110,top:6,textStyle:{color:'#3498db',fontSize:11,fontWeight:'normal'}},
      {text:`VOL`,left:70,top:'63%',textStyle:{color:'#555',fontSize:11,fontWeight:'normal'}},
      {text:'MACD',left:70,top:'79%',textStyle:{color:'#555',fontSize:11,fontWeight:'normal'}},
    ],
    tooltip:{
      trigger:'axis',
      axisPointer:{type:'line',lineStyle:{color:'#555',type:'dashed',width:1}},
      backgroundColor:'rgba(22,33,62,.95)',borderWidth:1,borderColor:'#2a2a4a',
      padding:[6,10],textStyle:{color:'#e0e0e0',fontSize:12},
      formatter:function(p){
        if(!p||!p.length)return'';
        const i=p[0].dataIndex, r=rows[i];
        const price=r[ci.close]||0;
        const pct=((price-openPrice)/openPrice*100);
        const cls=price>=openPrice?'#e74c3c':'#2ecc71';
        const s=pct>=0?'+':'';
        const lb='color:#555;font-size:11px;padding-right:4px';
        const vl=c=>`color:${c||'#bbb'}`;
        return `<div style="font-size:12px;line-height:1.6;min-width:280px">
          <div style="padding-bottom:4px;border-bottom:1px solid #2a2a4a;margin-bottom:3px"><b>${r[ci.time]}</b></div>
          <span style="${lb}">价</span> <span style="${vl(cls)}">${price.toFixed(2)}</span>
          <span style="${lb}">幅</span> <span style="${vl(cls)}">${s}${pct.toFixed(2)}%</span>
          <span style="${lb}">均价</span> <span style="${vl('#3498db')}">${r[ci.ma20]?.toFixed(2)||'-'}</span><br>
          <span style="${lb}">量</span> <span style="${vl()}">${fmtVol(r[ci.volume])}</span>
          <span style="${lb}">额</span> <span style="${vl()}">${r[ci.amount]?(r[ci.amount]/1e4).toFixed(1)+'万':'-'}</span><br>
          <span style="${lb}">DIF</span> <span style="${vl('#f1c40f')}">${r[ci.macd_dif]?.toFixed(3)||'-'}</span>
          <span style="${lb}">DEA</span> <span style="${vl('#3498db')}">${r[ci.macd_dea]?.toFixed(3)||'-'}</span>
          <span style="${lb}">MACD</span> <span style="${vl((r[ci.macd_hist]||0)>=0?'#e74c3c':'#2ecc71')}">${r[ci.macd_hist]?.toFixed(3)||'-'}</span>
        </div>`;
      }
    },
    grid:[
      {left:65,right:65,top:28,bottom:'42%'},
      {left:65,right:65,top:'64%',height:'12%'},
      {left:65,right:65,top:'80%',height:'16%'},
    ],
    xAxis:[
      {type:'category',data:times,gridIndex:0,boundaryGap:false,
        axisLine:{lineStyle:{color:'#2a2a3a'}},axisTick:{show:false},
        axisLabel:{color:'#555',fontSize:10,
          interval:function(index,value){
            return ['09:30','10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00'].indexOf(value)>=0;
          }}},
      {type:'category',data:times,gridIndex:1,boundaryGap:true,
        axisLine:{lineStyle:{color:'#2a2a3a'}},axisTick:{show:false},
        axisLabel:{show:false}},
      {type:'category',data:times,gridIndex:2,boundaryGap:true,
        axisLine:{lineStyle:{color:'#2a2a3a'}},axisTick:{show:false},
        axisLabel:{show:false}},
    ],
    yAxis:[
      {type:'value',gridIndex:0,min:pctMin,max:pctMax,
        splitNumber:4,interval:(pctMax-pctMin)/4,
        splitLine:{lineStyle:{color:'#1e1e30'}},
        axisPointer:{show:true,type:'line',lineStyle:{color:'#555',type:'dashed',width:1}},
        axisLabel:{color:'#555',fontSize:10,
          formatter:function(v){return v.toFixed(2)+'%';}},
        axisLine:{onZero:true},axisTick:{onZero:true}},
      {type:'value',gridIndex:0,position:'right',min:priceMin,max:priceMax,
        splitNumber:4,interval:(priceMax-priceMin)/4,
        splitLine:{show:false},
        axisPointer:{show:true,type:'line',lineStyle:{color:'#555',type:'dashed',width:1}},
        axisLabel:{color:'#555',fontSize:10,formatter:function(v){return v.toFixed(2);}}},
      {scale:true,gridIndex:1,splitLine:{lineStyle:{color:'#1e1e30'}},axisLabel:{show:false}},
      {scale:true,gridIndex:2,splitLine:{lineStyle:{color:'#1e1e30'}},axisLabel:{color:'#555',fontSize:10}},
    ],
    series:[
      {name:'价格',type:'line',xAxisIndex:0,yAxisIndex:1,data:pricesUp,symbol:'none',
        lineStyle:{width:1.5,color:UP}},
      {name:'价格2',type:'line',xAxisIndex:0,yAxisIndex:1,data:pricesDn,symbol:'none',
        lineStyle:{width:1.5,color:DN}},
      {name:'MA20',type:'line',xAxisIndex:0,yAxisIndex:1,data:ma20,symbol:'none',
        lineStyle:{width:1,color:'#f1c40f',type:'dashed'}},
      {name:'量',type:'bar',xAxisIndex:1,yAxisIndex:2,data:vols},
      {name:'MACD柱',type:'bar',xAxisIndex:2,yAxisIndex:3,data:hist},
      {name:'DIF',type:'line',xAxisIndex:2,yAxisIndex:3,data:dif,symbol:'none',lineStyle:{width:1,color:'#f1c40f'}},
      {name:'DEA',type:'line',xAxisIndex:2,yAxisIndex:3,data:dea,symbol:'none',lineStyle:{width:1,color:'#3498db'}},
    ],
  }, true);

  // Reference line at open price (0%)
  intradayChart.setOption({
    series:[{yAxisIndex:1,markLine:{silent:true,symbol:'none',lineStyle:{color:'#555',type:'solid',width:1},
      data:[{yAxis:openPrice}]}}]
  });
}

// --- K-line mode (1min / 5min) ---
function renderIntradayKline(data, refPrice) {
  const rows = data.data, len = rows.length;
  if (!len) return;

  const ci = {};
  data.columns.forEach((c, i) => ci[c] = i);

  const times=[], ohlc=[], vols=[], ma5=[], ma20=[], dif=[], dea=[], hist=[];

  const allPrices = [];

  for (let i=0; i<len; i++) {
    const r = rows[i];
    times[i] = r[ci.time];
    const o=r[ci.open], c=r[ci.close], h=r[ci.high], l=r[ci.low];
    ohlc[i]=[o,c,l,h];
    allPrices.push(o,c,h,l);
    vols[i]={value:r[ci.volume]||0, itemStyle:{color:c>=o?UP:DN,opacity:.6}};

    Math.max(...allPrices.map(p => Math.abs((p||0) - openPrice))),

      {text:'VOL',left:70,top:'66%',textStyle:{color:'#555',fontSize:11,fontWeight:'normal'}},
      {text:'MACD',left:70,top:'81%',textStyle:{color:'#555',fontSize:11,fontWeight:'normal'}},

    tooltip:{
      trigger:'axis',

      padding:[6,10],textStyle:{color:'#e0e0e0',fontSize:12},
      formatter:function(p){
        if(!p||!p.length)return'';
        const i=p[0].dataIndex, r=rows[i];
        const o=r[ci.open],c=r[ci.close],h=r[ci.high],l=r[ci.low];
        const pct=((c-openPrice)/openPrice*100);

        const vl=c2=>`color:${c2||'#bbb'}`;
        return `<div style="font-size:12px;line-height:1.6;min-width:280px">
          <div style="padding-bottom:4px;border-bottom:1px solid #2a2a4a;margin-bottom:3px"><b>${r[ci.time]}</b></div>
          <span style="${lb}">开</span> <span style="${vl()}">${o.toFixed(2)}</span>
          <span style="${lb}">高</span> <span style="${vl()}">${h.toFixed(2)}</span>
          <span style="${lb}">低</span> <span style="${vl()}">${l.toFixed(2)}</span><br>
          <span style="${lb}">收</span> <span style="${vl(cls)}">${c.toFixed(2)}</span>
          <span style="${lb}">幅</span> <span style="${vl(cls)}">${s}${pct.toFixed(2)}%</span>
          <span style="${lb}">量</span> <span style="${vl()}">${fmtVol(r[ci.volume])}</span><br>

    ],
    dataZoom: [],
    series:[
      {name:'K线',type:'candlestick',xAxisIndex:0,yAxisIndex:1,data:ohlc,
        itemStyle:{color:UP,color0:DN,borderColor:UP,borderColor0:DN}},
      {name:'MA5',type:'line',xAxisIndex:0,yAxisIndex:1,data:ma5,symbol:'none',lineStyle:{width:1,color:'#f1c40f'}},
      {name:'MA20',type:'line',xAxisIndex:0,yAxisIndex:1,data:ma20,symbol:'none',lineStyle:{width:1,color:'#3498db'}},

      {name:'DIF',type:'line',xAxisIndex:2,yAxisIndex:3,data:dif,symbol:'none',lineStyle:{width:1,color:'#f1c40f'}},
      {name:'DEA',type:'line',xAxisIndex:2,yAxisIndex:3,data:dea,symbol:'none',lineStyle:{width:1,color:'#3498db'}},
    ],
  }, true);
}

// Mode switching
const switchMode = debounce(async function(mode) {
  if (mode === intradayMode) return;
  intradayMode = mode;
  updateModeButtons();
  await loadAndRenderIntraday();
}, 400);

// Close modal
function closeIntraday() {
  document.getElementById('intradayModal').classList.remove('active');
  if (intradayChart) { intradayChart.dispose(); intradayChart = null; }
  intradayCache = {};
}

document.getElementById('intradayClose').addEventListener('click', debounce(closeIntraday, 300));

// Keyboard: ESC close, Left/Right switch date
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('intradayModal');
  if (!modal.classList.contains('active')) return;

  if (e.key === 'Escape') {
    closeIntraday();
    return;
  }

  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    const delta = e.key === 'ArrowLeft' ? -1 : 1;
    const newIdx = intradayDateIndex + delta;
    if (newIdx < 0 || newIdx >= intradayDates.length) return;
    intradayDateIndex = newIdx;
    updateIntradayTitle();
    loadAndRenderIntraday();
    return;
  }
});

// Get stock code from URL: /stock/600519 -> '600519'
const code = window.location.pathname.split('/').pop() || '600519';
loadStock(code);
